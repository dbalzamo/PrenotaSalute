spring.application.name=PrenotazioneMedica

## Server Properties
server.port=8080
server.servlet.context-path=/prenotazione-medica

# JWT — jwt.secret deve essere Base64 (chiave HMAC ≥ 32 byte decodificati). In produzione impostare sempre JWT_SECRET.
jwt.secret=${JWT_SECRET:MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
jwt.expirationMs=${JWT_EXPIRATION_MS:900000}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
# Allinea timestamp JDBC e auditing (JpaAuditingConfig) allo stesso fuso UTC in persistenza
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Internazionalizzazione
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Logging
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.root=WARN
logging.level.prenotazione.medica=INFO