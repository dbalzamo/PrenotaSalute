## Server Properties
server.port=8080
server.servlet.context-path=/prenotazione-medica

# ==== JWT ====
jwt.secret=======================BezKoder=Spring===========================
jwt.expirationMs=3600000
jwt.jwtCookieName= myCookie

# === Database ===
spring.application.name=PrenotazioneMedica
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_book_management?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

## Hibernate Properties
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true               
spring.jpa.properties.hibernate.format_sql=true

# === Logging ===
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE