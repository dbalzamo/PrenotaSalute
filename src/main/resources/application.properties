spring.application.name=Medivue
app.version=1.0.0

## Server Properties
server.port=8080
server.servlet.context-path=/prenotazione-medica

# JWT — jwt.secret deve essere Base64 (chiave HMAC ≥ 32 byte decodificati). In produzione impostare sempre JWT_SECRET.
jwt.secret=${JWT_SECRET}
jwt.expirationMs=${JWT_EXPIRATION_MS}

# Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false
# Allinea timestamp JDBC e auditing (JpaAuditingConfig) allo stesso fuso UTC in persistenza
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Internazionalizzazione
spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

# Logging
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
logging.level.root=WARN
logging.level.prenotazione.medica=INFO

# Batch
spring.batch.job.enabled=false
spring.batch.jdbc.initialize-schema=always

# OpenAPI (SpringDoc): URL del server per Swagger UI "Try it out".
# server.servlet.context-path non viene sempre riflesso nel campo servers del documento OpenAPI;
# qui lo si include esplicitamente (stesso effetto del vecchio OpenApiServerCustomizer).
springdoc.open-api.servers[0].url=http://localhost:${server.port}${server.servlet.context-path}
springdoc.open-api.servers[0].description=Ambiente locale (include context-path)